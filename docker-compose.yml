services:
  # PHP Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: timetap-app
    container_name: timetap-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - timetap-network

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: timetap-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d/
    networks:
      - timetap-network

  node:
    image: node:20-alpine
    container_name: timetap-node
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      - NODE_ENV=development
    # This keeps the container running so it can watch for file changes
    command: npm run dev
    networks:
      - timetap-network

  # MySQL Database
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    container_name: timetap
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - timetap-network

networks:
  timetap-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
