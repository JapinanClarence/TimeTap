version: "3.9"

services:
  # -------------------------------------------------------
  # Laravel App (PHP-FPM + Nginx via supervisord)
  # -------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: php-base
      args:
        # VITE_ vars are baked into the JS bundle during the node-builder
        # stage. Add any new VITE_ variable here AND in the Dockerfile ARGs.
        APP_NAME: "${APP_NAME:-timetap}"
        VITE_APP_NAME: "${APP_NAME:-timetap}"
        VITE_CLOUDINARY_CLOUD_NAME: "${VITE_CLOUDINARY_CLOUD_NAME:-}"
        VITE_CLOUDINARY_PRESET: "${VITE_CLOUDINARY_PRESET:-}"
    container_name: timetap_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_NAME: "${APP_NAME:-timetap}"
      APP_ENV: "${APP_ENV:-local}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_URL: "${APP_URL:-http://localhost:8080}"

      # Aiven MySQL — set these in your .env
      DB_CONNECTION: mysql
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      MYSQL_SSL_CA: "/var/www/html/docker/certs/ca.pem"  # Aiven CA cert path

      CACHE_DRIVER: "${CACHE_DRIVER:-file}"
      SESSION_DRIVER: "${SESSION_DRIVER:-file}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-sync}"

      VITE_APP_URL: "${APP_URL:-http://localhost:8080}"
      VITE_CLOUDINARY_CLOUD_NAME: "${VITE_CLOUDINARY_CLOUD_NAME:-}"
      VITE_CLOUDINARY_PRESET: "${VITE_CLOUDINARY_PRESET:-}"
    volumes:
      - .:/var/www/html
      - ./docker/certs:/var/www/html/docker/certs:ro  # Mount Aiven CA cert
      - storage_data:/var/www/html/storage
    networks:
      - timetap_net
    # depends_on:
    #   - redis

  # -------------------------------------------------------
  # Vite Dev Server (only used in local dev)
  # -------------------------------------------------------
  vite:
    image: node:20-alpine
    container_name: timetap_vite
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - VITE_APP_URL=${APP_URL:-http://localhost:8080}
      - VITE_APP_NAME=${APP_NAME:-timetap}
      - VITE_CLOUDINARY_CLOUD_NAME=${VITE_CLOUDINARY_CLOUD_NAME:-}
      - VITE_CLOUDINARY_PRESET=${VITE_CLOUDINARY_PRESET:-}
    networks:
      - timetap_net

  # -------------------------------------------------------
  # Redis (optional — for cache/sessions/queues)
  # -------------------------------------------------------
  # redis:
  #   image: redis:7-alpine
  #   container_name: timetap_redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - timetap_net

volumes:
  storage_data:
  node_modules:
  vite_build:
networks:
  timetap_net:
    driver: bridge
