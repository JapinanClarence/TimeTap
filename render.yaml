services:
  # -------------------------------------------------------
  # Laravel Web Service
  # -------------------------------------------------------
  - type: web
    name: timetap
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: singapore
    branch: main

    healthCheckPath: /up

    dockerBuildArgs:
      APP_NAME: timetap
      VITE_CLOUDINARY_CLOUD_NAME: ""  
      VITE_CLOUDINARY_PRESET: ""      

    envVars:
      - key: APP_NAME
        value: timetap

      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: "false"

      - key: APP_KEY
        generateValue: true

      - key: APP_URL
        value: https://timetap.japinanc.space

      - key: ASSET_URL
        value: https://timetap.japinanc.space

      # --- Google OAuth ---
      - key: GOOGLE_CLIENT_ID
        sync: false  

      - key: GOOGLE_CLIENT_SECRET
        sync: false  

      - key: GOOGLE_REDIRECT_URI
        value: https://timetap.japinanc.space/auth/google/callback

      # --- Aiven MySQL ---
      - key: DB_CONNECTION
        value: mysql

      - key: DB_HOST
        sync: false

      - key: DB_PORT
        sync: false

      - key: DB_DATABASE
        sync: false

      - key: DB_USERNAME
        sync: false

      - key: DB_PASSWORD
        sync: false

      - key: MYSQL_ATTR_SSL_CA
        value: /var/www/html/docker/certs/ca.pem

      - key: DB_OPTIONS
        value: '{"PDO::MYSQL_ATTR_SSL_VERIFY_SERVER_CERT": false}'

      # --- Cache / Session ---
      - key: CACHE_DRIVER
        value: file

      - key: SESSION_DRIVER
        value: file

      - key: QUEUE_CONNECTION
        value: sync

      - key: LOG_CHANNEL
        value: stderr

      - key: LOG_LEVEL
        value: error