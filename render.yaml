services:
  - type: web
    name: timetap-app
    env: php
    plan: free
    buildCommand: |
      composer install --no-interaction --optimize-autoloader
      npm install && npm run build
      php artisan optimize
    startCommand: php artisan migrate --force && php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: timetap-db
          property: connectionString
      - key: APP_KEY
        generateValue: true
      - key: NODE_VERSION
        value: 20.x

  # 2. The Managed MySQL Database
  - type: database
    name: timetap-db
    engine: mysql
    plan: free