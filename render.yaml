services:
  # -------------------------------------------------------
  # Laravel Web Service
  # -------------------------------------------------------
  - type: web
    name: timetap
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter          # Change to: standard, pro, etc.
    region: singapore      # Closest to Davao, PH — change if needed
    branch: main           # Your deploy branch

    healthCheckPath: /up
    
    dockerBuildArgs:
      APP_NAME: timetap
      VITE_APP_NAME: timetap
      VITE_CLOUDINARY_CLOUD_NAME: ""   # override in Render dashboard
      VITE_CLOUDINARY_PRESET: "" 

    envVars:
      - key: APP_NAME
        value: timetap

      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: "false"

      - key: APP_KEY
        generateValue: true   # Render auto-generates a secret

      - key: APP_URL
        value: https://timetap-v8s4.onrender.com

      # Forces Laravel's asset() and Vite helpers to always use https://
      - key: ASSET_URL
        value: https://timetap-v8s4.onrender.com

      # --- Aiven MySQL ---
      # Set these as secret env vars in the Render dashboard
      - key: DB_CONNECTION
        value: mysql

      - key: DB_HOST
        sync: false   # Set in Render dashboard (Aiven hostname)

      - key: DB_PORT
        sync: false   # Aiven MySQL port (usually 3306 or custom)

      - key: DB_DATABASE
        sync: false

      - key: DB_USERNAME
        sync: false

      - key: DB_PASSWORD
        sync: false

      - key: MYSQL_ATTR_SSL_CA
        value: /var/www/html/docker/certs/ca.pem   # Aiven SSL cert

      - key: DB_OPTIONS
        value: '{"PDO::MYSQL_ATTR_SSL_VERIFY_SERVER_CERT": false}'

      # --- Cache / Session ---
      - key: CACHE_DRIVER
        value: file

      - key: SESSION_DRIVER
        value: file

      - key: QUEUE_CONNECTION
        value: sync

      - key: LOG_CHANNEL
        value: stderr        # Render streams stderr to its log dashboard

      - key: LOG_LEVEL
        value: error